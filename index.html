<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>모바일 1인칭 게임 데모</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      touch-action: none;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #game {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background:
        linear-gradient(#7ec8ff 0 45%, #4a8f3a 45% 100%);
      overflow: hidden;
    }
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: white;
    }
    #crosshair {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 18px;
      height: 18px;
      transform: translate(-50%, -50%);
    }
    #crosshair::before,
    #crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.95);
    }
    #crosshair::before {
      left: 8px; top: 0; width: 2px; height: 18px;
    }
    #crosshair::after {
      top: 8px; left: 0; width: 18px; height: 2px;
    }
    #info {
      position: absolute;
      left: 12px;
      top: 10px;
      font-size: 14px;
      line-height: 1.4;
      background: rgba(0,0,0,0.25);
      padding: 8px 10px;
      border-radius: 10px;
      backdrop-filter: blur(4px);
    }
    #message {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.4);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    #message.show { opacity: 1; }
    .control {
      position: fixed;
      pointer-events: auto;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    #movePad {
      left: 18px;
      bottom: 22px;
      width: 134px;
      height: 134px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.15);
      box-shadow: inset 0 0 30px rgba(255,255,255,0.05);
    }
    #moveStick {
      position: absolute;
      left: 42px;
      top: 42px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(255,255,255,0.28);
      border: 2px solid rgba(255,255,255,0.24);
    }
    #lookZone {
      right: 0;
      top: 0;
      width: 52%;
      height: 100%;
      background: transparent;
    }
    .btn {
      width: 78px;
      height: 78px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(3px);
    }
    #jumpBtn {
      right: 118px;
      bottom: 30px;
    }
    #fireBtn {
      right: 24px;
      bottom: 120px;
      width: 92px;
      height: 92px;
      font-size: 18px;
      background: rgba(255,120,120,0.16);
    }
    #minimap {
      position: absolute;
      right: 12px;
      top: 10px;
      width: 120px;
      height: 120px;
      background: rgba(0,0,0,0.22);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .hint {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      font-size: 13px;
      color: rgba(255,255,255,0.9);
      background: rgba(0,0,0,0.25);
      padding: 6px 10px;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <div id="hud">
    <div id="crosshair"></div>
    <div id="info">체력 100<br>적 4</div>
    <canvas id="minimap" width="120" height="120"></canvas>
    <div id="message"></div>
    <div class="hint">왼쪽 패드 이동 · 오른쪽 드래그 시점 · 점프/발사 버튼</div>
  </div>

  <div id="movePad" class="control">
    <div id="moveStick"></div>
  </div>
  <div id="lookZone" class="control"></div>
  <div id="jumpBtn" class="control btn">점프</div>
  <div id="fireBtn" class="control btn">발사</div>

  <script>
    const game = document.getElementById('game');
    const info = document.getElementById('info');
    const message = document.getElementById('message');
    const movePad = document.getElementById('movePad');
    const moveStick = document.getElementById('moveStick');
    const lookZone = document.getElementById('lookZone');
    const jumpBtn = document.getElementById('jumpBtn');
    const fireBtn = document.getElementById('fireBtn');
    const minimap = document.getElementById('minimap');
    const mctx = minimap.getContext('2d');

    const world = {
      size: 1400,
      walls: [
        { x: 200, z: 120, w: 150, h: 40, color: '#6b4f2d' },
        { x: -220, z: -140, w: 50, h: 180, color: '#6b4f2d' },
        { x: 340, z: -180, w: 70, h: 130, color: '#7b5d34' },
        { x: -360, z: 220, w: 180, h: 50, color: '#7b5d34' },
        { x: 40, z: 300, w: 220, h: 50, color: '#6b4f2d' }
      ]
    };

    const player = {
      x: 0,
      y: 0,
      z: 0,
      yaw: 0,
      pitch: 0,
      vy: 0,
      height: 56,
      speed: 260,
      radius: 28,
      hp: 100
    };

    let enemies = [
      { x: 240, z: 240, hp: 3, color: '#d94e4e' },
      { x: -240, z: 180, hp: 3, color: '#c63f3f' },
      { x: 260, z: -220, hp: 3, color: '#d94e4e' },
      { x: -320, z: -260, hp: 3, color: '#c63f3f' }
    ];

    const moveInput = { x: 0, y: 0, active: false, id: null };
    const lookInput = { active: false, id: null, lastX: 0, lastY: 0 };
    let lastTime = performance.now();
    let recoil = 0;
    let fireCooldown = 0;

    function showMessage(text) {
      message.textContent = text;
      message.classList.add('show');
      clearTimeout(showMessage.t);
      showMessage.t = setTimeout(() => message.classList.remove('show'), 900);
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function rectCollideCircle(cx, cz, r, rect) {
      const rx = rect.x - rect.w / 2;
      const rz = rect.z - rect.h / 2;
      const closestX = clamp(cx, rx, rx + rect.w);
      const closestZ = clamp(cz, rz, rz + rect.h);
      const dx = cx - closestX;
      const dz = cz - closestZ;
      return dx * dx + dz * dz < r * r;
    }

    function canMove(nx, nz) {
      const half = world.size / 2 - player.radius;
      if (nx < -half || nx > half || nz < -half || nz > half) return false;
      return !world.walls.some(w => rectCollideCircle(nx, nz, player.radius, w));
    }

    function render() {
      const skyShift = player.pitch * 0.12;
      game.innerHTML = '';

      const horizon = document.createElement('div');
      horizon.style.position = 'absolute';
      horizon.style.left = '0';
      horizon.style.right = '0';
      horizon.style.top = `calc(45% + ${skyShift}px)`;
      horizon.style.height = '2px';
      horizon.style.background = 'rgba(255,255,255,0.18)';
      game.appendChild(horizon);

      const centerX = innerWidth / 2;
      const centerY = innerHeight / 2 + player.pitch - recoil;
      const fov = 420;

      const objects = [];
      world.walls.forEach(w => objects.push({ type: 'wall', ...w }));
      enemies.forEach((e, i) => objects.push({ type: 'enemy', ...e, idx: i }));

      objects.sort((a, b) => {
        const da = (a.x - player.x) ** 2 + (a.z - player.z) ** 2;
        const db = (b.x - player.x) ** 2 + (b.z - player.z) ** 2;
        return db - da;
      });

      for (const obj of objects) {
        const dx = obj.x - player.x;
        const dz = obj.z - player.z;
        const sin = Math.sin(-player.yaw);
        const cos = Math.cos(-player.yaw);
        const rx = dx * cos - dz * sin;
        const rz = dx * sin + dz * cos;
        if (rz < 20) continue;

        const screenX = centerX + (rx / rz) * fov;
        if (obj.type === 'wall') {
          const scale = fov / rz;
          const width = obj.w * scale;
          const height = 170 * scale;
          const div = document.createElement('div');
          div.style.position = 'absolute';
          div.style.left = `${screenX - width / 2}px`;
          div.style.top = `${centerY - height / 2}px`;
          div.style.width = `${width}px`;
          div.style.height = `${height}px`;
          div.style.background = obj.color;
          div.style.border = '1px solid rgba(0,0,0,0.25)';
          div.style.boxShadow = 'inset 0 0 40px rgba(0,0,0,0.15)';
          game.appendChild(div);
        } else {
          const scale = fov / rz;
          const size = 95 * scale;
          const div = document.createElement('div');
          div.style.position = 'absolute';
          div.style.left = `${screenX - size / 2}px`;
          div.style.top = `${centerY - size * 0.55}px`;
          div.style.width = `${size}px`;
          div.style.height = `${size}px`;
          div.style.borderRadius = '12px';
          div.style.background = obj.color;
          div.style.boxShadow = '0 8px 18px rgba(0,0,0,0.25)';
          div.style.display = 'flex';
          div.style.alignItems = 'center';
          div.style.justifyContent = 'center';
          div.style.color = 'white';
          div.style.fontWeight = '700';
          div.textContent = '적';
          game.appendChild(div);
        }
      }

      const gun = document.createElement('div');
      gun.style.position = 'absolute';
      gun.style.right = '8%';
      gun.style.bottom = `${-8 + recoil * 1.4}px`;
      gun.style.width = '140px';
      gun.style.height = '120px';
      gun.style.background = 'linear-gradient(135deg, #555, #222)';
      gun.style.clipPath = 'polygon(18% 28%, 72% 20%, 100% 46%, 92% 64%, 56% 68%, 48% 100%, 20% 100%, 22% 54%, 0 48%)';
      gun.style.opacity = '0.95';
      game.appendChild(gun);
    }

    function drawMinimap() {
      mctx.clearRect(0, 0, minimap.width, minimap.height);
      mctx.fillStyle = 'rgba(20,40,20,0.95)';
      mctx.fillRect(0, 0, 120, 120);
      const scale = 120 / world.size;
      const toMap = (x, z) => [60 + x * scale, 60 + z * scale];

      mctx.strokeStyle = 'rgba(255,255,255,0.15)';
      mctx.strokeRect(2, 2, 116, 116);

      for (const w of world.walls) {
        const [mx, mz] = toMap(w.x, w.z);
        mctx.fillStyle = '#9a7a44';
        mctx.fillRect(mx - w.w * scale / 2, mz - w.h * scale / 2, w.w * scale, w.h * scale);
      }
      for (const e of enemies) {
        const [mx, mz] = toMap(e.x, e.z);
        mctx.fillStyle = '#ff6666';
        mctx.beginPath();
        mctx.arc(mx, mz, 4, 0, Math.PI * 2);
        mctx.fill();
      }
      const [px, pz] = toMap(player.x, player.z);
      mctx.fillStyle = '#7ad7ff';
      mctx.beginPath();
      mctx.arc(px, pz, 5, 0, Math.PI * 2);
      mctx.fill();
      mctx.strokeStyle = '#7ad7ff';
      mctx.beginPath();
      mctx.moveTo(px, pz);
      mctx.lineTo(px + Math.sin(player.yaw) * 12, pz + Math.cos(player.yaw) * 12);
      mctx.stroke();
    }

    function updateInfo() {
      info.innerHTML = `체력 ${Math.max(0, Math.round(player.hp))}<br>적 ${enemies.length}`;
    }

    function update(dt) {
      fireCooldown = Math.max(0, fireCooldown - dt);
      recoil *= 0.82;

      const sin = Math.sin(player.yaw);
      const cos = Math.cos(player.yaw);
      const forward = moveInput.y;
      const side = moveInput.x;
      const vx = (sin * forward + cos * side) * player.speed;
      const vz = (cos * forward - sin * side) * player.speed;
      const nx = player.x + vx * dt;
      const nz = player.z + vz * dt;

      if (canMove(nx, player.z)) player.x = nx;
      if (canMove(player.x, nz)) player.z = nz;

      player.vy -= 850 * dt;
      player.y += player.vy * dt;
      if (player.y < 0) {
        player.y = 0;
        player.vy = 0;
      }

      for (const e of enemies) {
        const dx = player.x - e.x;
        const dz = player.z - e.z;
        const dist = Math.hypot(dx, dz);
        if (dist > 65) {
          const spd = 32 * dt;
          e.x += (dx / dist) * spd;
          e.z += (dz / dist) * spd;
        } else {
          player.hp -= 10 * dt;
          if (player.hp <= 0) {
            player.hp = 0;
            showMessage('게임 오버 - 새로고침으로 다시 시작');
          }
        }
      }

      updateInfo();
      render();
      drawMinimap();
    }

    function shoot() {
      if (fireCooldown > 0 || player.hp <= 0) return;
      fireCooldown = 0.28;
      recoil = 16;

      let bestIndex = -1;
      let bestAngle = 0.16;
      let bestDistance = Infinity;

      enemies.forEach((e, idx) => {
        const dx = e.x - player.x;
        const dz = e.z - player.z;
        const distance = Math.hypot(dx, dz);
        const angleToEnemy = Math.atan2(dx, dz);
        let diff = angleToEnemy - player.yaw;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        const abs = Math.abs(diff);
        if (abs < bestAngle && distance < bestDistance) {
          bestAngle = abs;
          bestDistance = distance;
          bestIndex = idx;
        }
      });

      if (bestIndex >= 0) {
        enemies[bestIndex].hp -= 1;
        if (enemies[bestIndex].hp <= 0) {
          enemies.splice(bestIndex, 1);
          showMessage('적 처치');
          if (enemies.length === 0) showMessage('승리! 모든 적을 처치했습니다');
        } else {
          showMessage('명중');
        }
      } else {
        showMessage('빗나감');
      }
    }

    function jump() {
      if (player.y === 0 && player.hp > 0) {
        player.vy = 340;
      }
    }

    movePad.addEventListener('pointerdown', e => {
      moveInput.active = true;
      moveInput.id = e.pointerId;
      movePad.setPointerCapture(e.pointerId);
    });
    movePad.addEventListener('pointermove', e => {
      if (!moveInput.active || moveInput.id !== e.pointerId) return;
      const rect = movePad.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      let dx = e.clientX - cx;
      let dy = e.clientY - cy;
      const dist = Math.hypot(dx, dy);
      const max = 42;
      if (dist > max) {
        dx = dx / dist * max;
        dy = dy / dist * max;
      }
      moveStick.style.transform = `translate(${dx}px, ${dy}px)`;
      moveInput.x = dx / max;
      moveInput.y = -dy / max;
    });
    function resetMove() {
      moveInput.active = false;
      moveInput.x = 0;
      moveInput.y = 0;
      moveStick.style.transform = 'translate(0, 0)';
    }
    movePad.addEventListener('pointerup', resetMove);
    movePad.addEventListener('pointercancel', resetMove);

    lookZone.addEventListener('pointerdown', e => {
      lookInput.active = true;
      lookInput.id = e.pointerId;
      lookInput.lastX = e.clientX;
      lookInput.lastY = e.clientY;
      lookZone.setPointerCapture(e.pointerId);
    });
    lookZone.addEventListener('pointermove', e => {
      if (!lookInput.active || lookInput.id !== e.pointerId) return;
      const dx = e.clientX - lookInput.lastX;
      const dy = e.clientY - lookInput.lastY;
      lookInput.lastX = e.clientX;
      lookInput.lastY = e.clientY;
      player.yaw += dx * 0.008;
      player.pitch = clamp(player.pitch + dy * 0.5, -120, 120);
    });
    function resetLook() {
      lookInput.active = false;
    }
    lookZone.addEventListener('pointerup', resetLook);
    lookZone.addEventListener('pointercancel', resetLook);

    jumpBtn.addEventListener('pointerdown', e => {
      e.preventDefault();
      jump();
    });
    fireBtn.addEventListener('pointerdown', e => {
      e.preventDefault();
      shoot();
    });

    window.addEventListener('keydown', e => {
      if (e.code === 'Space') jump();
      if (e.code === 'Enter') shoot();
    });

    function loop(now) {
      const dt = Math.min(0.033, (now - lastTime) / 1000);
      lastTime = now;
      update(dt);
      requestAnimationFrame(loop);
    }

    updateInfo();
    render();
    drawMinimap();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
